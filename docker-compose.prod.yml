version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: predictix_mongodb_prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secure_password_change_me
    volumes:
      - mongodb_prod_data:/data/db

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: predictix_backend_prod
    restart: always
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://admin:secure_password_change_me@mongodb:27017/predictix?authSource=admin
      - PORT=5000
    depends_on:
      - mongodb

  ml-service:
    build: ./ml-service
    container_name: predictix_ml_prod
    restart: always
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: predictix_frontend_prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_prod_data:
